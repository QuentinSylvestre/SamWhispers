# SamWhispers configuration
# Copy to config.toml and adjust as needed.
# Search order: ./config.toml, ~/.config/samwhispers/config.toml

[hotkey]
key = "ctrl+shift+alt"
mode = "hold"  # "hold" or "toggle"
language_key = "ctrl+shift+l"  # Cycles through whisper.languages list

[whisper]
server_url = "http://localhost:8090"
languages = ["auto"]  # Language cycle order. Use "auto" for auto-detection.
managed = true                                              # false to use an external whisper-server
server_bin = "tools/whisper.cpp/build/bin/whisper-server"    # path to whisper-server binary
model_path = "tools/whisper.cpp/models/ggml-base.en.bin"    # path to whisper model file
# For multi-language, use a multilingual model (e.g., ggml-base.bin, not ggml-base.en.bin).
# Recommended: ggml-medium.bin or larger for reliable auto-detection.
# Examples: ["auto", "en", "fr"], ["en"], ["auto"]
accent = ""                     # Your native language code for accent biasing (e.g., "fr" for
                                # a French speaker dictating in English). Biases Whisper toward
                                # recognizing accented speech. Suppressed when the active
                                # language matches the accent code.
# accent_prompt = ""            # Custom accent prompt (overrides the generic template).
                                # Example: "The speaker is a native French speaker.
                                # Words like 'the', 'this', 'that' may sound like 'ze', 'zis', 'zat'."

[audio]
sample_rate = 16000
max_duration = 300.0  # seconds

[cleanup]
enabled = false
provider = "openai"  # "openai" or "anthropic"

[cleanup.openai]
api_key = ""
model = "gpt-4o-mini"
api_base = "https://api.openai.com/v1"

[cleanup.anthropic]
api_key = ""
model = "claude-sonnet-4-20250514"
api_base = "https://api.anthropic.com"

[postprocess]
collapse_newlines = true     # Replace \n from whisper segments with spaces
collapse_spaces = true       # Collapse multiple spaces into one
trim = true                  # Strip leading/trailing whitespace
trailing = "newline"         # Append after text: "none", "space", "newline", "double_newline", "tab"

[inject]
paste_delay = 0.1  # seconds between clipboard write and Ctrl+V

[vocabulary]
# Words to bias Whisper toward recognizing (sent as initial_prompt).
# Keep this list short and broadly applicable -- domain-specific jargon
# for a single conversation may cause mild misrecognition in unrelated contexts.
# Best for: proper nouns, project names, technical terms you use frequently.
# Token limit: ~150-200 words total (shared with per-language lists).
words = []

# Per-language vocabulary (merged with global words when that language is active).
# [vocabulary.en]
# words = ["Bluetooth Low Energy"]
# [vocabulary.fr]
# words = ["Bluetooth basse consommation"]

[filler]
enabled = true          # Remove filler words from transcription
use_builtins = true     # Include built-in filler lists (English + French)
words = []              # Additional filler words to remove (elongated variants auto-detected)
# Built-in English: um, uh, hmm, mm, mhm, mmm, ah, oh, er
# Built-in French: euh, bah, beh, ben, hein, mmh, mh, pfff
